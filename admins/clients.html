<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebyHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" id="theme_color" href="">
    <link rel="stylesheet" href="./admins.css">
    <link rel="stylesheet" href="./client.css">
</head>
<body>
    <div>
        <header class=" sticky-top row justify-content-between align-items-center border-bottom border-light-subtle">
            <div id="logo" class="col-auto col-md-3 col-lg-2 text-center border-end border-light-subtle h-100 row justify-content-center align-items-center m-0 p-0"><img class="w-auto" src="../images/logo6.png" alt="logo"></div>
            <div class="col-auto col-md-9 col-lg-10 h-100 row justify-content-center align-items-center m-0 p-0 px-2" >
                <div class="row justify-content-end">
                    <div class="d-none d-md-flex search_box row col-6 px-2">
                        <label for="search" class="w-auto row justify-content-center align-items-center p-0 m-0 border border-secondary-subtle border-end-0  rounded-start-3 rounded-end-0 "><i class="fa-solid fa-magnifying-glass"></i></label><input id="search" class="col-4 border border-secondary-subtle border-start-0 rounded-end-3 rounded-start-0 " type="search">
                    </div>
                    <div class="row col-12 col-md-6 justify-content-end gap-2">
                        <div class="name_account col-4 m-0 p-0"><span id="name_admin"></span><span>Admin</span></div>
                        <img src="../images/profile1.png" class="col-4 flex_topimg m-0 p-0" alt="profile">
                        <button class="col-4 " id="bar_btn"><i class="fa-solid fa-bars" style="color: rgb(131, 192, 251);"></i></button>
                    </div>
                </div>
            </div>
        </header>
        <div class="row">
        <aside  class="col-10 col-sm-4 col-md-3 col-lg-2 border-end border-light-subtle position-fixed right-0">
            <ul class="px-0">
                <li class="px-2 my-4"><a href="./dashboard.html"  class="  p-2 row rounded-2"><i class="fa-solid fa-chart-line  col-auto"></i>Dashboard</a></li>
                <li class="px-2 my-4"><a href="./clients.html" class="active  p-2 row rounded-2"><i class="fa-solid fa-user-group  col-auto"></i>clients</a></li>
                <li class="px-2 my-4"><a href="./addclients.html" class=" p-2 row rounded-2"><i class="fa-solid fa-user-plus  col-auto"></i>Add client</a></li>
                <li class="px-2 my-4"><a href="./plans.html" class=" p-2 row rounded-2"><i class="fa-solid fa-money-check  col-auto"></i>Plans</a></li>
                <li class="px-2 my-4"><a href="../home.html" class=" p-2 row rounded-2"><i
                                class="fa-solid fa-house  col-auto"></i>Home</a></li>
                <li class="px-2 my-4"><a href="./settings.html" class=" p-2 row rounded-2"><i class="fa-solid fa-gear  col-auto"></i>Settings</a></li>
            <li class="px-2 my-4"><button id="log_out" class="log_out p-2 row rounded-2"><i class="fa-solid fa-right-from-bracket col-auto"></i>Log out</button></li>
                </ul>
            </aside>
            <div id="log_out_confirm">
                <div class="confirm_box row justify-content-center align-items-center">
                    <p class="col-12 text-center">Are you sure you want to log out?</p>
                    <div class="row justify-content-center gap-4">
                        <button id="confirm_yes" class="col-4 p-2 rounded-2">Yes</button>
                        <button id="confirm_no" class="col-4 p-2 rounded-2">No</button>
                    </div>
                </div>
            </div>
        <main   class="col-12  col-lg-10">
            <section class="row align-items-center justify-content-end flex-column flex-md-row">
                <div class="col-auto col-md-6 col-lg-10 align-self-start">
                    <h1>Clients</h1>
                    <p class="describe">Manage all clients and their subscriptions</p>
                </div>
                <div class="col-auto col-md-6 col-lg-2 text-end align-self-end">
                     <a href="./addclients.html" class="btn add_client"><i class="fa-solid fa-user-plus"></i> Add New Client</a>
                </div>
            </section>
            <section class="table_box">
                <div class="filter_box ">
                    <div class="search_box row">
                        <label for="filter"  class=" col-2 col-lg-1 row justify-content-center align-items-center p-0 m-0 border border-secondary-subtle border-end-0  rounded-start-3 rounded-end-0 "><i class="fa-solid fa-magnifying-glass"></i></label>
                        <input id="filter" class="col-10 col-lg-6 border border-secondary-subtle border-start-0 rounded-end-3 rounded-start-0 " type="search">
                    </div>
                    <div class="select_filter">
                        <select name=""  id="service_select" >
                            <option value="all">All services</option>
                            <option value="Gym">Gym</option>
                            <option value="Taekwondo">Taekwondo</option>
                            <option value="Music">Music</option>
                        </select>
                        <select name="" id="status_select">
                            <option value="all">All Status</option>
                            <option value="Active">Active</option>
                            <option value="Expired">Expired</option>
                            <option value="Panding">Panding</option>
                        </select>
                    </div>
                </div>
                <div class="table">
                    <table class="body_table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>SERVICE</th>
                                <th >PLAN</th>
                                <th >START</th>
                                <th >EXPIRY</th>
                                <th >STATUS</th>
                                <th class='td_action'>ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="body_table">
                            
                        </tbody>
                    </table>
                </div>
                
            </section>
        </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
     <script type="module" src="./admins.js"></script>
     <script src="./client.js"></script>
</body>
</html>
